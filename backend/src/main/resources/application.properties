server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/travel_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=TravelManagementSystemSecretKey2024VeryLongAndSecureKeyForJWT
jwt.expiration=86400000

file.upload-dir=./uploads

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

cors.allowed-origins=http://localhost:3000

logging.level.com.tms=DEBUG
logging.level.org.springframework.security=DEBUG